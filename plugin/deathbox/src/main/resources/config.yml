  death.virtual: "§6[데스박스] §f상자를 놓을 안전한 자리가 없어 아이템을 §e{id} §f상자에 안전하게 보관했어요. 관리자에게 §e/deathbox recover {id} §f를 요청하세요."
  death.limit-virtual: "§6[데스박스] §f활성 데스박스가 너무 많아 이번 아이템은 §e{id} §f상자에 보관했어요. 관리자에게 §e/deathbox recover {id} §f를 요청하세요."
