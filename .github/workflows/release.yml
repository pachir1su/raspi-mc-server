name: Build deployment release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${EVENT_TAG:-${MANUAL_TAG:-}}"
          test -n "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'

      - name: Set up Gradle 9.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Build and test the Paper operations plugin
        shell: bash
        run: gradle -p plugins/raspi-mc-ops clean test jar --no-daemon

      - name: Build the DeathBox plugin
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp -f plugin/deathbox package
          cp plugin/deathbox/target/DeathBox-*.jar plugin/deathbox/target/DeathBox.jar

      - name: Build manifest-verified ZIP
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 scripts/build_release.py \
            --repo . \
            --output "dist/raspi-mc-server-${TAG}.zip" \
            --tag "$TAG" \
            --commit "$GITHUB_SHA" \
            --extra-file \
              "plugins/raspi-mc-ops/build/libs/raspi-mc-ops.jar=bundled-plugins/raspi-mc-ops.jar" \
            --extra-file \
              "plugin/deathbox/target/DeathBox.jar=bundled-plugins/DeathBox.jar"
          cd dist
          sha256sum "raspi-mc-server-${TAG}.zip" > SHA256SUMS

      - name: Attach deployment files to the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          for _ in {1..10}; do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            sleep 3
          done
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "dist/raspi-mc-server-${TAG}.zip" \
            dist/SHA256SUMS \
            --clobber
